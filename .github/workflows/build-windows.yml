name: Build Windows (Compose Desktop)

# Builds the Nyora Compose Multiplatform desktop app and packages a Windows MSI
# installer (with a bundled JRE) for x64 and ARM64. The :shared module compiles
# the Kotatsu engine from ../nyora-mac/shared/src, so the whole repo is checked out.

on:
  push:
    branches: [main]
    paths:
      - "nyora-windows/**"
      - "nyora-mac/shared/**"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: nyora-windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # jpackage needs WiX Toolset v3 on PATH to build the MSI (WiX 4+ is NOT
      # compatible with jpackage). The windows runners ship Chocolatey.
      - name: Install WiX Toolset v3
        shell: pwsh
        run: choco install wixtoolset --version=3.11.2 -y --no-progress

      - name: Build helper engine + UI (compile check)
        shell: pwsh
        run: ./gradlew --no-daemon :desktopApp:compileKotlin

      - name: Package MSI
        shell: pwsh
        run: ./gradlew --no-daemon :desktopApp:packageReleaseMsi

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: nyora-windows-${{ matrix.arch }}-msi
          path: nyora-windows/desktopApp/build/compose/binaries/main-release/msi/*.msi
          if-no-files-found: error
