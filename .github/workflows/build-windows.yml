name: Release Windows

# Builds the Nyora Compose Desktop app and packages a Windows MSI (bundled JRE,
# no Java install needed) for x64 and ARM64, then publishes them to a GitHub
# Release. 32-bit x86 is not supported — Compose Desktop / Skiko ship no 32-bit
# Windows runtime and JDK 17 dropped 32-bit Windows.
#
# The :shared module compiles the Kotatsu engine from the nyora-shared submodule,
# so the checkout must be recursive.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # jpackage needs WiX Toolset v3 on PATH to build the MSI (WiX 4+ is NOT
      # compatible with jpackage). The Windows runners ship Chocolatey.
      - name: Install WiX Toolset v3
        shell: pwsh
        run: choco install wixtoolset --version=3.11.2 -y --no-progress

      - name: Package MSI
        shell: pwsh
        run: .\gradlew.bat --no-daemon :desktopApp:packageReleaseMsi

      - name: Stage MSI (arch-named)
        shell: pwsh
        run: |
          $msi = Get-ChildItem desktopApp/build/compose/binaries/main-release/msi/*.msi | Select-Object -First 1
          if (-not $msi) { throw "No MSI produced" }
          Copy-Item $msi.FullName "Nyora-Windows-${{ matrix.arch }}.msi"
          Get-Item "Nyora-Windows-${{ matrix.arch }}.msi" | Format-List Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: nyora-windows-${{ matrix.arch }}
          path: Nyora-Windows-${{ matrix.arch }}.msi
          if-no-files-found: error

  release:
    needs: build
    # Run even if one arch fails so the other still publishes.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nyora for Windows ${{ github.ref_name }}
          files: dist/*.msi
          fail_on_unmatched_files: false
          body: |
            **Nyora for Windows ${{ github.ref_name }}** — Compose Desktop with a bundled Java runtime (no separate install needed).

            - `Nyora-Windows-x64.msi` — Intel / AMD 64-bit
            - `Nyora-Windows-arm64.msi` — ARM64 (Snapdragon, etc.)

            32-bit x86 isn't supported — Compose Desktop / JDK 17 are 64-bit only.
