name: Release Windows

# Builds the Nyora Compose Desktop app and packages a Windows .exe installer
# (bundled JRE, no Java install needed) for x64 and ARM64, then publishes them
# to a GitHub Release. 32-bit x86 is not supported — Compose Desktop / Skiko
# ship no 32-bit Windows runtime and JDK 17 dropped 32-bit Windows.
#
# The :shared module compiles the Kotatsu engine from the nyora-shared submodule,
# so the checkout must be recursive.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
          - arch: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          # nyora-shared is now a public submodule, so the default GITHUB_TOKEN
          # can clone it — no PAT needed.
          submodules: recursive

      # Zulu (Azul) ships JDK 17 for BOTH Windows x64 and aarch64; Temurin has no
      # Windows-ARM64 17 build, so setup-java can't satisfy it on the arm64 runner.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      # jpackage's Windows .exe/.msi installers require WiX 3.x (candle.exe /
      # light.exe) on PATH. The choco package is flaky (its .NET 3.5 dependency
      # fails on the runners), so drop the WiX 3.14 binaries straight onto PATH.
      # They're x86 and run under emulation on the arm64 runner.
      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\wix.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\wix.zip" -DestinationPath "$env:RUNNER_TEMP\wix" -Force
          "$env:RUNNER_TEMP\wix" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "WiX installed:"; Get-ChildItem "$env:RUNNER_TEMP\wix\candle.exe","$env:RUNNER_TEMP\wix\light.exe" | Format-List Name

      - name: Package EXE installer
        shell: pwsh
        run: .\gradlew.bat --no-daemon :desktopApp:packageReleaseExe

      - name: Stage EXE (arch-named)
        shell: pwsh
        run: |
          $exe = Get-ChildItem desktopApp/build/compose/binaries/main-release/exe/*.exe | Select-Object -First 1
          if (-not $exe) { throw "No EXE produced" }
          Copy-Item $exe.FullName "Nyora-Windows-${{ matrix.arch }}.exe"
          Get-Item "Nyora-Windows-${{ matrix.arch }}.exe" | Format-List Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: nyora-windows-${{ matrix.arch }}
          path: Nyora-Windows-${{ matrix.arch }}.exe
          if-no-files-found: error

  release:
    needs: build
    # Run even if one arch fails so the other still publishes.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nyora for Windows ${{ github.ref_name }}
          files: dist/*.exe
          fail_on_unmatched_files: false
          body: |
            **Nyora for Windows ${{ github.ref_name }}** — Compose Desktop with a bundled Java runtime (no separate install needed).

            - `Nyora-Windows-x64.exe` — Intel / AMD 64-bit
            - `Nyora-Windows-arm64.exe` — ARM64 (Snapdragon, etc.)

            32-bit x86 isn't supported — Compose Desktop / JDK 17 are 64-bit only.
