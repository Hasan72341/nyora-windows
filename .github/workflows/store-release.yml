name: Microsoft Store release

# Builds the Nyora Compose Desktop app as per-architecture MSIX packages (x64 on
# windows-latest, ARM64 on windows-11-arm), bundles them into a single
# .msixbundle, and submits it to the Microsoft Store via the Microsoft Store
# Developer CLI (msstore).
#
# ── IMPORTANT CAVEATS (from Microsoft's docs) ──────────────────────────────────
#   1. Store update automation is supported for FREE products only. Nyora is free. ✓
#   2. The app must already be PUBLISHED AND LIVE in the Store at least once
#      (do the first submission manually in Partner Center). This workflow
#      automates UPDATES to that live product — not the very first submission.
#   3. msstore authenticates with an Entra (Azure AD) app registration that has
#      the "Manager" role in Partner Center → Account settings → User management.
#
# ── REQUIRED REPOSITORY SECRETS (Settings → Secrets and variables → Actions) ──
#   AZURE_AD_TENANT_ID            Entra tenant ID
#   AZURE_AD_APPLICATION_CLIENT_ID   Entra app registration "Application (client) ID"
#   AZURE_AD_APPLICATION_SECRET      Entra app client secret value
#   SELLER_ID                    Partner Center publisher / seller ID
# The Store Product ID is public (it's in your Partner Center URL) — set below.
#
# ── BEFORE THE FIRST RUN ──
#   Fill the real Partner Center identity into msix/AppxManifest.xml
#   (Product management → Product Identity): Name, Publisher (CN=…), and
#   PublisherDisplayName. The guard step below fails fast if placeholders remain.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.2.0). Normalised to 4 parts."
        required: true
        default: "2.0.6.0"
  # To submit automatically whenever you publish a GitHub release, uncomment:
  # release:
  #   types: [published]

env:
  # Public Store product ID (from your Partner Center URL: .../products/<ID>/...).
  STORE_PRODUCT_ID: "9MZTV9GXQ4V0"

jobs:
  build:
    name: Build ${{ matrix.arch }} MSIX
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            # Temurin's Windows x64 runtime relies on the OS Universal CRT
            # (present on every Win10 1809+ / Win11) and app-locals ONLY the
            # VC++ runtime (vcruntime140*.dll, msvcp140.dll). Zulu additionally
            # ships a PRIVATE app-local UCRT (ucrtbase.dll + api-ms-win-crt-*),
            # which is the one thing that differs between our build hosts and a
            # pristine cert machine — and the most likely trigger of the Store
            # cert "Failed to launch JVM" crash on clean Win11 26200 (25H2).
            # Using Temurin removes that variable for the x64 package.
            jdk: temurin
          - arch: arm64
            runner: windows-11-arm
            # Temurin has no Windows-ARM64 JDK 17 build, so ARM64 stays on Zulu
            # (the only vendor that ships one). The cert failure was x64-only.
            jdk: zulu
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          # nyora-shared is a public submodule now, so the default token can read it.
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: ${{ matrix.jdk }}
          java-version: "17"

      - name: Fail if the manifest still has Partner Center placeholders
        shell: pwsh
        run: |
          $m = Get-Content -Raw msix/AppxManifest.xml
          if ($m -match 'PARTNER_CENTER') {
            Write-Error "msix/AppxManifest.xml still contains PARTNER_CENTER placeholders. Fill in your real Product Identity (Name, Publisher, PublisherDisplayName) from Partner Center before submitting."
            exit 1
          }
          Write-Host "Manifest identity looks set."

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($v)) {
            # Triggered by a release: derive from the tag (strip a leading 'v').
            $v = "${{ github.ref_name }}" -replace '^v',''
          }
          if ([string]::IsNullOrWhiteSpace($v)) { $v = "1.0.0" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v"

      # Bake the OAuth client secret into the app resources (gitignored) so the
      # Store MSIX can complete Google sign-in on end-user machines.
      - name: Bake OAuth secret
        shell: pwsh
        run: |
          $dir = "desktopApp/src/main/resources"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          "GOOGLE_CLIENT_SECRET=$env:GOOGLE_CLIENT_SECRET" | Out-File -FilePath "$dir/nyora-oauth.properties" -Encoding ascii
          if ([string]::IsNullOrWhiteSpace($env:GOOGLE_CLIENT_SECRET)) { Write-Host "::warning::GOOGLE_CLIENT_SECRET secret is empty — Google sign-in will not work in this build." }
        env:
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Build ${{ matrix.arch }} MSIX
        shell: pwsh
        run: .\scripts\build-msix.ps1 -Architecture ${{ matrix.arch }} -Version ${{ steps.ver.outputs.version }}

      # Prove the bundled JVM actually comes up in the app-image jpackage just
      # produced. Catches the exact "Failed to launch JVM" class of failure that
      # the Store cert lab hit — BEFORE we bundle and submit. Two checks:
      #   1) The bundled java.exe -version loads jvm.dll + all its CRT deps.
      #   2) The real jpackage launcher (Nyora.exe) gets PAST JVM creation
      #      (stays alive), rather than dying instantly with the launch error.
      # NOTE: GitHub runners are NOT pristine (they have VC++ redist), so a PASS
      # here is necessary-but-not-sufficient — final validation is a clean-OS VM.
      - name: Smoke-test the bundled JVM launch (${{ matrix.arch }})
        if: ${{ matrix.arch == 'x64' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $appRoot = "desktopApp/build/compose/binaries/main-release/app"
          $exe = Get-ChildItem -Path $appRoot -Recurse -Filter *.exe -File |
                 Where-Object { $_.FullName -notmatch '\\runtime\\' } |
                 Select-Object -First 1
          if (-not $exe) { throw "No app launcher .exe found under $appRoot" }
          $imgDir  = $exe.Directory.FullName
          $javaExe = Join-Path $imgDir 'runtime\bin\java.exe'
          Write-Host "App launcher : $($exe.FullName)"
          Write-Host "Bundled java : $javaExe"

          Write-Host "`n--- runtime\bin CRT composition (shows whether an app-local UCRT is present) ---"
          Get-ChildItem (Join-Path $imgDir 'runtime\bin') -Filter *.dll |
            Where-Object { $_.Name -match '^(ucrtbase|api-ms-win-crt|vcruntime140|msvcp140|concrt140)' } |
            Select-Object Name | Format-Table -AutoSize

          Write-Host "`n--- (1) bundled java.exe -version ---"
          & $javaExe -version
          if ($LASTEXITCODE -ne 0) { throw "Bundled java.exe -version FAILED (exit $LASTEXITCODE) — jvm.dll / CRT load chain is broken." }

          Write-Host "`n--- (2) launch the jpackage app for 20s and watch for the launch error ---"
          $outFile = Join-Path $env:RUNNER_TEMP 'nyora-launch.out'
          $errFile = Join-Path $env:RUNNER_TEMP 'nyora-launch.err'
          $p = Start-Process -FilePath $exe.FullName -PassThru `
                 -RedirectStandardOutput $outFile -RedirectStandardError $errFile
          Start-Sleep -Seconds 20
          $alive = -not $p.HasExited
          if ($alive) {
            Write-Host "OK: launcher still running after 20s -> JVM created successfully. Stopping it."
            try { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue } catch {}
          } else {
            Write-Host "Launcher exited early with code $($p.ExitCode)."
          }
          $out = (Test-Path $outFile) ? (Get-Content $outFile -Raw) : ''
          $err = (Test-Path $errFile) ? (Get-Content $errFile -Raw) : ''
          if ($out) { Write-Host "--- stdout ---`n$out" }
          if ($err) { Write-Host "--- stderr ---`n$err" }
          if (("$out$err") -match 'Failed to launch JVM|Failed to load JVM|Error: could not|A JNI error') {
            throw "The jpackage launcher reported a JVM launch failure — this is the cert-blocking bug. Do not ship."
          }
          # Only the JVM-launch error is a hard failure. A non-JVM early exit on
          # the headless-ish runner (e.g. GPU/display) is NOT our bug and is not
          # failed here — it is validated on a real desktop / clean VM instead.
          Write-Host "Smoke test passed (no JVM launch failure detected)."

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: msix-${{ matrix.arch }}
          path: dist/Nyora-${{ matrix.arch }}-*.msix
          if-no-files-found: error

  submit:
    name: Bundle and (optionally) submit to the Store
    needs: build
    runs-on: windows-latest
    timeout-minutes: 30
    # Surface the Store credentials as env so steps can detect whether they're set.
    env:
      AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
      AZURE_AD_APPLICATION_CLIENT_ID: ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
      AZURE_AD_APPLICATION_SECRET: ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
      SELLER_ID: ${{ secrets.SELLER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Download per-arch MSIX
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: msix-*
          merge-multiple: true

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($v)) { $v = "${{ github.ref_name }}" -replace '^v','' }
          if ([string]::IsNullOrWhiteSpace($v)) { $v = "1.0.0" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Bundle the .msix files into a .msixbundle
        shell: pwsh
        run: |
          Get-ChildItem dist -Filter *.msix | Format-Table Name, Length
          .\scripts\build-msixbundle.ps1 -InputDir dist -Version ${{ steps.ver.outputs.version }}

      # Always publish the bundle as a downloadable artifact, so the first
      # submission (which is manual) can grab it even when no credentials are set.
      - name: Upload .msixbundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: msixbundle
          path: dist/*.msixbundle
          if-no-files-found: error

      # Detect whether the Store credentials are configured. If not, the run
      # still succeeds and you upload the .msixbundle artifact manually.
      - name: Check Store credentials
        id: creds
        shell: pwsh
        run: |
          $have = -not ([string]::IsNullOrWhiteSpace($env:SELLER_ID) -or
                        [string]::IsNullOrWhiteSpace($env:AZURE_AD_TENANT_ID) -or
                        [string]::IsNullOrWhiteSpace($env:AZURE_AD_APPLICATION_CLIENT_ID) -or
                        [string]::IsNullOrWhiteSpace($env:AZURE_AD_APPLICATION_SECRET))
          "have=$($have.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if (-not $have) {
            Write-Host "::notice::Store secrets not set — skipping auto-submit. Download the 'msixbundle' artifact and upload it in Partner Center."
          }

      - name: Configure the Microsoft Store CLI (puts msstore on PATH)
        if: steps.creds.outputs.have == 'true'
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Authenticate msstore
        if: steps.creds.outputs.have == 'true'
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId $env:AZURE_AD_TENANT_ID `
            --sellerId $env:SELLER_ID `
            --clientId $env:AZURE_AD_APPLICATION_CLIENT_ID `
            --clientSecret $env:AZURE_AD_APPLICATION_SECRET

      - name: Publish the bundle to the Store
        if: steps.creds.outputs.have == 'true'
        shell: pwsh
        run: |
          $bundle = Get-ChildItem dist -Filter *.msixbundle | Select-Object -First 1
          if (-not $bundle) { throw "No .msixbundle found in dist/." }
          Write-Host "Publishing $($bundle.Name) to product $env:STORE_PRODUCT_ID"
          msstore publish "$($bundle.FullName)" -id $env:STORE_PRODUCT_ID
